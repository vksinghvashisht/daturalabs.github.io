  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0B0B09;
      color: #E2DDD4;
      font-family: 'Tenor Sans', sans-serif;

    }
    .wordmark {
      font-size: 13px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #E2DDD4;

    }
    .wordmark span { color: #C4965A; }
    .headline {

      font-size: clamp(36px, 6vw, 72px);

      line-height: 1.1;
      text-align: center;
      margin-bottom: 32px;
      max-width: 700px;
    }
    .headline em { font-style: italic; color: #C4965A; }
    .sub {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 18px;
      font-weight: 300;
      color: #8A857A;
      text-align: center;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 64px;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #C4965A;
      margin: 0 auto 48px;
      opacity: 0.5;
    }
    .contact {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4A4740;
    }
    .contact a {
      color: #C4965A;
      text-decoration: none;
      border-bottom: 1px solid #7A5A32;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <div class="wordmark">Datura <span>Labs</span></div>
